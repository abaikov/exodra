<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" width="180" height="40">
  <defs>
    <linearGradient id="grad1-dark" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbcfe8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tree on the left -->
  <g transform="translate(20, 20)">
    <!-- Root at bottom -->
    <circle cx="0" cy="10" r="2.5" fill="#f472b6"/>
    
    <!-- Middle level -->
    <circle cx="-8" cy="0" r="2.5" fill="#f472b6"/>
    <circle cx="8" cy="0" r="2.5" fill="#f472b6"/>
    
    <!-- Top level -->
    <circle cx="-12" cy="-10" r="2" fill="#f9a8d4"/>
    <circle cx="-4" cy="-10" r="2" fill="#f9a8d4"/>
    <circle cx="4" cy="-10" r="2" fill="#f9a8d4"/>
    <circle cx="12" cy="-10" r="2" fill="#f9a8d4"/>
    
    <!-- Branches -->
    <line x1="0" y1="8" x2="-8" y2="2" stroke="#f472b6" stroke-width="1.5"/>
    <line x1="0" y1="8" x2="8" y2="2" stroke="#f472b6" stroke-width="1.5"/>
    <line x1="-8" y1="-2" x2="-12" y2="-8" stroke="#f9a8d4" stroke-width="1.2"/>
    <line x1="-8" y1="-2" x2="-4" y2="-8" stroke="#f9a8d4" stroke-width="1.2"/>
    <line x1="8" y1="-2" x2="4" y2="-8" stroke="#f9a8d4" stroke-width="1.2"/>
    <line x1="8" y1="-2" x2="12" y2="-8" stroke="#f9a8d4" stroke-width="1.2"/>
  </g>
  
  <!-- Text centered using baseline adjustment -->
  <text x="50" y="28" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="24" 
        font-weight="700" 
        fill="#f472b6">
    Exodra
  </text>
</svg>