name: Exodra Analysis

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run weekly on Monday at 2 AM UTC
    - cron: '0 2 * * 1'

jobs:
  analyze:
    name: Analyze Exodra Project
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
      issues: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Exodra Analysis
        id: analysis
        run: |
          npx @exodra/introspect analyze \
            --format=json \
            --output=analysis-results.json \
            --verbose
        continue-on-error: true
      
      - name: Check Quality Thresholds
        id: thresholds
        run: |
          npx @exodra/introspect check-thresholds analysis-results.json \
            --error-threshold=10 \
            --warning-threshold=50
        continue-on-error: true
      
      - name: Generate Analysis Report
        if: always()
        run: |
          npx @exodra/introspect analyze \
            --format=markdown \
            --output=analysis-report.md
      
      - name: Upload Analysis Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exodra-analysis-results
          path: |
            analysis-results.json
            analysis-report.md
      
      - name: Comment PR with Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('analysis-report.md', 'utf8');
            
            // Find and update or create comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.body.includes('<!-- exodra-analysis-report -->')
            );
            
            const body = `<!-- exodra-analysis-report -->\n${report}`;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
      
      - name: Fail if thresholds exceeded
        if: steps.thresholds.outcome == 'failure'
        run: |
          echo "❌ Code quality thresholds exceeded!"
          echo "Please review the analysis report for details."
          exit 1

  performance:
    name: Performance Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Performance Analysis
        run: |
          npx @exodra/introspect performance \
            --output=performance.json
      
      - name: Store Performance Results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: performance.json
      
      - name: Compare with Previous Run
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # This would compare with previous runs
          # and alert if performance degrades
          echo "Performance comparison would go here"