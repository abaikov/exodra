<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exodra Benchmarks</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #0f1117;
      color: #e6edf3;
    }
    h1 { margin-top: 0; }
    .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    button {
      background: #238636;
      color: white;
      border: none;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button:hover { background: #2ea043; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-bottom: 1rem; color: #8b949e; min-height: 1.25rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      border: 1px solid #30363d;
      padding: 0.5rem 0.75rem;
      text-align: left;
    }
    th { background: #161b22; }
    tr:nth-child(even) { background: #161b22; }
    .fastest { color: #3fb950; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Exodra Benchmarks</h1>
  <p>Compare Exodra, SolidJS, Svelte, and React. Rankings use median time (first 10% of samples discarded).</p>
  <div class="controls">
    <button id="runAll">Run All Benchmarks</button>
    <button id="runInitialRender">Initial Render Only</button>
  </div>
  <div id="status"></div>
  <table>
    <thead>
      <tr>
        <th>Benchmark</th>
        <th>Framework</th>
        <th>Median (ms)</th>
        <th>Avg (ms)</th>
        <th>Min (ms)</th>
        <th>Max (ms)</th>
        <th>Ops</th>
      </tr>
    </thead>
    <tbody id="results"></tbody>
  </table>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
